name: compile_and_test

on:
  push:
    branches: [ main,sonarqubeSetup ]

  pull_request:
    branches: [ main,sonarqubeSetup ]

  workflow_dispatch:

defaults:
  run:
    shell: bash
permissions:
  contents: write
jobs:
  build_and_test:
    name: Build & test game on ${{ matrix.os }} with ${{ matrix.compiler }}.
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest]
        compiler: [ g++-14 ]
        include:
          - os: ubuntu-latest
            compiler: g++-14
            target: Linux

          - os: windows-latest
            compiler: cl
            target: Windows

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v2
        with:
          submodules: true
          fetch-depth: 0

      - name: Install build dependencies (Linux)
        if: ${{ matrix.os == 'ubuntu-latest' }}
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential g++-14 gcc-14 cmake ninja-build \
            libx11-dev libxrandr-dev libxcursor-dev libxi-dev \
            libudev-dev libgl-dev libfreetype-dev \
            libogg-dev libvorbis-dev libflac-dev

      - name: Make scripts executable
        run: chmod +x ./scripts/*.sh

      - name: Setup MSVC Developer Command Prompt
        if: ${{ matrix.os == 'windows-latest' }}
        uses: ilammy/msvc-dev-cmd@v1.13.0

      - name: Compile a Build for game
        run: ./scripts/compile.sh ${{ matrix.compiler }} ${{ matrix.target }}

      - name: Run all of Tests.
        run: ./scripts/test.sh
  coverage:
    name: Coverage and SonarScan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          submodules: true
          fetch-depth: 0

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential g++-14 cmake ninja-build python3-pip
          sudo apt-get install -y gcovr
          sudo apt-get install -y \
            libx11-dev libxrandr-dev libxcursor-dev libxi-dev \
            libudev-dev libgl-dev libfreetype-dev \
            libogg-dev libvorbis-dev libflac-dev

      - name: Configure coverage build
        run: |
          cmake -S . -B build-coverage -G Ninja \
            -DCMAKE_BUILD_TYPE=Debug \
            -DENABLE_COVERAGE=ON \
            -DCMAKE_C_COMPILER=gcc-14 \
            -DCMAKE_CXX_COMPILER=g++-14 \
            -DCMAKE_EXPORT_COMPILE_COMMANDS=ON

      - name: Build coverage target
        run: cmake --build build-coverage --verbose

      - name: Run tests for coverage
        run: |
          echo "Running test binary directly..."
          ./build-coverage/tests

      - name: Check generated coverage data
        run: |
          echo "Generated .gcda files:"
          find build-coverage -name "*.gcda" | sort | head -100

          echo "GCDA count:"
          count=$(find build-coverage -name "*.gcda" | wc -l)
          echo "$count"

          if [ "$count" -eq 0 ]; then
            echo "No .gcda files generated. Coverage runtime did not write data."
            exit 1
          fi

      - name: Generate SonarCloud coverage report
        run: |
          gcovr \
            --root . \
            --object-directory build-coverage \
            --gcov-executable gcov-14 \
            --filter 'src/main/.*' \
            --exclude 'src/test/.*' \
            --exclude '.*dummy\.cpp' \
            --exclude 'vcpkg_installed/.*' \
            --exclude 'build-coverage/.*' \
            --txt \
            --sonarqube build-coverage/coverage.xml

      - name: Run SonarCloud scan
        uses: SonarSource/sonarqube-scan-action@v6
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.projectKey=ACPP-Team04_rpg04
            -Dsonar.organization=acpp-team04
            -Dsonar.projectVersion=${{ github.sha }}
            -Dsonar.sources=src/main
            -Dsonar.tests=src/test
            -Dsonar.exclusions=vcpkg_installed/**,build-coverage/**
            -Dsonar.coverage.exclusions=src/main/Implementation/main.cpp
            -Dsonar.cfamily.compile-commands=build-coverage/compile_commands.json
            -Dsonar.coverageReportPaths=build-coverage/coverage.xml
